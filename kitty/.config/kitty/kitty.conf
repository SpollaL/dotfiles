# vim:fileencoding=utf-8:foldmethod=marker

# ── Font ──────────────────────────────────────────────────────────────────────
font_family      "JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Fallback to a common monospace font if Nerd Font is not installed
# font_family      monospace

# ── Cursor ────────────────────────────────────────────────────────────────────
# Start with block; vim/neovim will switch to beam (insert) and underline (replace)
# via DECSCUSR escape codes — kitty respects them automatically.
cursor_shape                    block
cursor_blink_interval           0
cursor_stop_blinking_after      0

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width   10
hide_window_decorations no
remember_window_size   yes

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_style              powerline
tab_powerline_style        slanted
tab_bar_margin_height      4 0
tab_title_template         "  {index}  {tab.active_wd.split('/')[-1] or '~'} "
active_tab_title_template  "  {index}  {tab.active_wd.split('/')[-1] or '~'} "

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── Misc ──────────────────────────────────────────────────────────────────────
copy_on_select          yes
strip_trailing_spaces   smart
url_style               curly

# ── Catppuccin Mocha ──────────────────────────────────────────────────────────
include themes/mocha.conf
