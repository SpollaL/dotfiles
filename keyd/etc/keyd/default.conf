[ids]
*

[global]
tap_timeout = 200
chord_timeout = 50

[main]

# Tap = Esc, hold = Shift (home row leftmost, like ZSA)
capslock = overload(shift, esc)

# Caps Word (QWERTY row leftmost, like ZSA)
tab = overload(capsword, tab)

# Home row mods - tap = letter, hold = modifier
f = overload(shift, f)
j = overload(shift, j)
g = overload(meh, g)
h = overload(meh, h)

# Index stretch - tap = letter, hold = alt/super
w = overload(alt, w)
e = overload(meta, e)
o = overload(rightalt, o)
i = overload(meta, i)
z = overload(alt, z)
/ = overload(rightalt, /)

# Layer activation
# (Alt still accessible via w/o/z//)
leftalt = overload(sym, tab)
space   = overload(nav, space)

[sym]

# Number row -> F-keys
1 = f1
2 = f2
3 = f3
4 = f4
5 = f5
6 = f6
7 = f7
8 = f8
9 = f9
0 = f10
- = f11
= = f12

# QWERTY row - symbols (left hand)
tab = grave
q = !
w = @
e = #
r = $
t = %

# QWERTY row - numpad (right hand)
y = 7
u = 8
i = 9
o = -
p = /

# Home row - symbols (left hand)
capslock = ^
a = &
s = *
d = (
f = )

# Home row - numpad (right hand)
h = 4
j = 5
k = 6
l = +
; = :
' = "

# Bottom row - brackets (left hand)
z = [
x = ]
c = {
v = }

# Bottom row - numpad (right hand)
n = 1
m = 2
, = 3
. = .

# 0 on space
space = 0

[nav]

# IJKL navigation
i = up
j = left
k = down
l = right

# Extended navigation
y = pageup
u = home
o = end
n = pagedown

# Tab switching
m = C-tab
, = C-S-tab

# Media keys on left hand
q = volumedown
w = volumeup
e = mute
r = previoussong
t = nextsong
f = playpause

[meh:C-A-S-]
